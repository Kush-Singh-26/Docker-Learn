<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastAPI + Nginx Demo</title>
</head>
<body>
  <h1>Hello from Nginx Frontend!</h1>
  <button id="btn">Get API Message</button>
  <p id="msg"></p>

  <script>
    document.getElementById('btn').onclick = async () => {
      const res = await fetch('/api/hello');
      const data = await res.json();
      document.getElementById('msg').textContent = data.message;
    };
  </script>
</body>
</html>
