version: "3.8"

services:
  backend:
    build: ./backend
    container_name: fastapi_backend
    expose:
      - "8000"

  frontend:
    image: nginx:alpine
    container_name: nginx_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend